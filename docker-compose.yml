services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: aila
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aila"]
      interval: 3s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/aila
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/aila
      MIN_DELAY_SECONDS: 3
      MAX_DELAY_SECONDS: 60
      FAIL_RATE: 0.2
      CONCURRENCY: 8
      CLAIM_BATCH: 10
      MAX_ATTEMPTS: 3
    depends_on:
      db:
        condition: service_healthy
